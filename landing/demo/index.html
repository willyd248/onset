<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>onset — try DJing in 3 minutes</title>
<meta name="description" content="Learn your first DJ transition in 3 minutes. No downloads, no controller needed.">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--lime:#84fb42;--lime-dim:#2a6900;--purple:#d9a5ff;--bg:#0a0a0a;--surface:#141414;--surface-hi:#1e1e1e;--text:#e5e2e1;--text-dim:#888;--radius:12px}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent}

/* Header */
.demo-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.05)}
.demo-brand{display:flex;align-items:center;gap:8px}
.demo-brand svg{height:20px;width:auto}
.demo-step{font-size:12px;font-weight:600;color:var(--text-dim);letter-spacing:0.05em}

/* Main content area */
.demo-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:24px;position:relative}

/* Loading screen */
.demo-loading{text-align:center}
.demo-loading h2{font-size:20px;font-weight:700;margin-bottom:8px}
.demo-loading p{font-size:14px;color:var(--text-dim)}
.spinner{width:40px;height:40px;border:3px solid var(--surface-hi);border-top-color:var(--lime);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Lesson instruction */
.lesson-title{font-size:28px;font-weight:700;text-align:center;line-height:1.2}
.lesson-subtitle{font-size:15px;color:var(--text-dim);text-align:center;max-width:300px}

/* Deck indicators */
.deck-row{display:flex;gap:16px;width:100%;max-width:360px}
.deck-indicator{flex:1;background:var(--surface);border-radius:var(--radius);padding:12px 16px;text-align:center}
.deck-indicator__label{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px}
.deck-indicator__label--a{color:var(--lime)}
.deck-indicator__label--b{color:var(--purple)}
.deck-indicator__name{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.deck-indicator__status{font-size:11px;margin-top:4px;font-weight:600}
.deck-indicator__status--playing{color:var(--lime)}
.deck-indicator__status--stopped{color:var(--text-dim)}

/* Play button */
.play-btn{width:120px;height:120px;border-radius:50%;border:3px solid var(--lime);background:transparent;color:var(--lime);font-size:48px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s ease;position:relative}
.play-btn:hover,.play-btn:active{background:var(--lime);color:var(--bg);transform:scale(1.05)}
.play-btn svg{width:48px;height:48px;fill:currentColor;margin-left:4px}

/* Pulse animation for guidance */
.pulse{animation:pulse-ring 1.5s ease-out infinite}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(132,251,66,0.4)}70%{box-shadow:0 0 0 20px rgba(132,251,66,0)}100%{box-shadow:0 0 0 0 rgba(132,251,66,0)}}

/* Crossfader */
.crossfader-wrap{width:100%;max-width:340px}
.crossfader-labels{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:8px}
.crossfader-labels span:first-child{color:var(--lime)}
.crossfader-labels span:last-child{color:var(--purple)}
.crossfader-input{-webkit-appearance:none;appearance:none;width:100%;height:48px;background:var(--surface);border-radius:var(--radius);outline:none;cursor:pointer}
.crossfader-input::-webkit-slider-thumb{-webkit-appearance:none;width:56px;height:40px;background:var(--lime);border-radius:8px;cursor:grab;border:none}
.crossfader-input::-moz-range-thumb{width:56px;height:40px;background:var(--lime);border-radius:8px;cursor:grab;border:none}

/* Bass EQ slider */
.eq-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.eq-label{font-size:13px;font-weight:700;color:var(--lime);letter-spacing:0.05em}
.eq-slider-container{width:80px;height:200px;background:var(--surface);border-radius:var(--radius);position:relative;display:flex;align-items:center;justify-content:center}
.eq-slider{-webkit-appearance:none;appearance:none;width:200px;height:60px;background:transparent;transform:rotate(-90deg);cursor:pointer;position:absolute}
.eq-slider::-webkit-slider-thumb{-webkit-appearance:none;width:48px;height:48px;background:var(--lime);border-radius:8px;cursor:grab;border:none}
.eq-slider::-moz-range-thumb{width:48px;height:48px;background:var(--lime);border-radius:8px;cursor:grab;border:none}
.eq-slider::-webkit-slider-runnable-track{background:transparent}
.eq-value{font-size:24px;font-weight:700;color:var(--lime);font-variant-numeric:tabular-nums}

/* Guidance arrow */
.guide-arrow{font-size:24px;color:var(--lime);animation:bounce-down 1s ease infinite}
@keyframes bounce-down{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
.guide-arrow--right{animation:bounce-right 1s ease infinite}
@keyframes bounce-right{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}

/* Progress bar */
.progress-bar{width:100%;max-width:360px;height:4px;background:var(--surface);border-radius:2px;overflow:hidden}
.progress-bar__fill{height:100%;background:var(--lime);border-radius:2px;transition:width 0.3s ease}

/* Celebration */
.celebration{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.celebration h2{font-size:24px;font-weight:700;line-height:1.3}
.celebration .score{font-size:64px;font-weight:700;color:var(--lime)}
.celebration .score-label{font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-top:-8px}
.cta-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;font-family:inherit;font-size:15px;font-weight:700;border:none;border-radius:var(--radius);cursor:pointer;transition:all 0.2s ease;text-decoration:none}
.cta-btn--primary{background:var(--lime);color:var(--bg)}
.cta-btn--primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.cta-btn--ghost{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.15)}
.cta-btn--ghost:hover{border-color:var(--lime);color:var(--lime)}
.cta-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}

/* Confetti */
.confetti{position:fixed;top:-10px;width:10px;height:10px;border-radius:2px;animation:fall linear forwards;pointer-events:none;z-index:100}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* Footer hint */
.demo-footer{padding:12px 20px;text-align:center;font-size:12px;color:var(--text-dim);border-top:1px solid rgba(255,255,255,0.05)}

/* Lesson complete checkmark */
.check{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;background:var(--lime);color:var(--bg);font-size:28px;font-weight:700}

/* Transition between lessons */
.fade-enter{animation:fadeIn 0.3s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header class="demo-header">
  <div class="demo-brand">
    <svg viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="14" cy="16" r="11" stroke="#84fb42" stroke-width="2.5"/><circle cx="14" cy="16" r="3" fill="#84fb42"/><text x="30" y="23" font-family="'Space Grotesk',system-ui,sans-serif" font-weight="700" font-size="22" fill="#84fb42" letter-spacing="-0.02em">nset</text></svg>
    <span style="font-size:12px;color:var(--text-dim)">demo</span>
  </div>
  <div class="demo-step" id="step-indicator"></div>
</header>

<main class="demo-content" id="demo-content" aria-live="polite">
  <!-- Content injected by JS -->
</main>

<div class="progress-bar" id="progress-bar" style="display:none">
  <div class="progress-bar__fill" id="progress-fill" style="width:0%"></div>
</div>

<footer class="demo-footer" id="demo-footer">
  No controller needed — just your mouse or finger
</footer>

<script>
// ── Audio Engine (minimal) ──────────────────────────────────
let ctx = null;
let bufferA = null, bufferB = null;
let sourceA = null, sourceB = null;
let gainA = null, gainB = null;
let eqLowA = null;
let isPlayingA = false, isPlayingB = false;

async function initAudio() {
  ctx = new (window.AudioContext || window.webkitAudioContext)();

  // Gains for crossfader
  gainA = ctx.createGain();
  gainB = ctx.createGain();
  gainA.gain.value = 1;
  gainB.gain.value = 0;

  // Low shelf EQ for Deck A bass
  eqLowA = ctx.createBiquadFilter();
  eqLowA.type = 'lowshelf';
  eqLowA.frequency.value = 250;
  eqLowA.gain.value = 0;

  gainA.connect(ctx.destination);
  gainB.connect(ctx.destination);
}

async function loadTrack(url) {
  const res = await fetch(url);
  const buf = await res.arrayBuffer();
  return ctx.decodeAudioData(buf);
}

function playDeck(deck) {
  if (deck === 'A' && bufferA && !isPlayingA) {
    sourceA = ctx.createBufferSource();
    sourceA.buffer = bufferA;
    sourceA.loop = true;
    sourceA.connect(eqLowA);
    eqLowA.connect(gainA);
    sourceA.start();
    isPlayingA = true;
  }
  if (deck === 'B' && bufferB && !isPlayingB) {
    sourceB = ctx.createBufferSource();
    sourceB.buffer = bufferB;
    sourceB.loop = true;
    sourceB.connect(gainB);
    sourceB.start();
    isPlayingB = true;
  }
}

function setCrossfader(value) {
  // value: 0 = all A, 1 = all B
  const angle = value * Math.PI / 2;
  gainA.gain.value = Math.cos(angle);
  gainB.gain.value = Math.sin(angle);
}

function setBassEQ(db) {
  if (eqLowA) eqLowA.gain.value = db;
}

// ── State Machine ───────────────────────────────────────────
const content = document.getElementById('demo-content');
const stepIndicator = document.getElementById('step-indicator');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const footer = document.getElementById('demo-footer');

let state = 'loading';
let lessonScores = [false, false, false];

function render(html) {
  content.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'fade-enter';
  div.innerHTML = html;
  content.appendChild(div);
}

// ── Loading State ───────────────────────────────────────────
async function startDemo() {
  stepIndicator.textContent = '';
  progressBar.style.display = 'none';

  render(`
    <div class="demo-loading">
      <div class="spinner"></div>
      <h2>Setting up the decks...</h2>
      <p>Loading demo tracks</p>
    </div>
  `);

  try {
    await initAudio();
    const [a, b] = await Promise.all([
      loadTrack('/assets/demo/track-a.mp3'),
      loadTrack('/assets/demo/track-b.mp3'),
    ]);
    bufferA = a;
    bufferB = b;
    startLesson1();
  } catch (err) {
    render(`
      <div class="demo-loading">
        <h2>Could not load demo</h2>
        <p>Please try refreshing the page.</p>
      </div>
    `);
  }
}

// ── Lesson 1: Hit Play ──────────────────────────────────────
function startLesson1() {
  state = 'lesson1';
  stepIndicator.textContent = '1 of 3';
  progressBar.style.display = 'block';
  progressFill.style.width = '0%';
  footer.textContent = 'Lesson 1 of 3';

  render(`
    <p class="lesson-title">Hit Play</p>
    <p class="lesson-subtitle">Press the play button to start Deck A. You'll hear the music instantly.</p>
    <div class="guide-arrow">↓</div>
    <button class="play-btn pulse" id="play-btn" aria-label="Play Deck A">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="deck-row">
      <div class="deck-indicator">
        <div class="deck-indicator__label deck-indicator__label--a">Deck A</div>
        <div class="deck-indicator__name">Vox and Bells</div>
        <div class="deck-indicator__status deck-indicator__status--stopped" id="status-a">Stopped</div>
      </div>
      <div class="deck-indicator">
        <div class="deck-indicator__label deck-indicator__label--b">Deck B</div>
        <div class="deck-indicator__name">Through the Beat</div>
        <div class="deck-indicator__status deck-indicator__status--stopped">Ready</div>
      </div>
    </div>
  `);

  document.getElementById('play-btn').addEventListener('click', () => {
    if (ctx.state === 'suspended') ctx.resume();
    playDeck('A');
    const statusA = document.getElementById('status-a');
    if (statusA) {
      statusA.textContent = '▶ Playing';
      statusA.className = 'deck-indicator__status deck-indicator__status--playing';
    }
    const btn = document.getElementById('play-btn');
    btn.classList.remove('pulse');
    btn.style.background = 'var(--lime)';
    btn.style.color = 'var(--bg)';
    btn.style.borderColor = 'var(--lime)';

    lessonScores[0] = true;
    progressFill.style.width = '33%';

    setTimeout(() => {
      showLessonComplete(1, 'Music is playing!', startLesson2);
    }, 1500);
  }, { once: true });
}

// ── Lesson 2: Blend it in ───────────────────────────────────
function startLesson2() {
  state = 'lesson2';
  stepIndicator.textContent = '2 of 3';
  footer.textContent = 'Lesson 2 of 3';

  // Start Deck B
  playDeck('B');
  setCrossfader(0); // start full A

  render(`
    <p class="lesson-title">Blend it in</p>
    <p class="lesson-subtitle">Drag the crossfader from A all the way to B. Listen to the transition.</p>
    <div class="deck-row">
      <div class="deck-indicator">
        <div class="deck-indicator__label deck-indicator__label--a">Deck A</div>
        <div class="deck-indicator__name">Vox and Bells</div>
        <div class="deck-indicator__status deck-indicator__status--playing">▶ Playing</div>
      </div>
      <div class="deck-indicator">
        <div class="deck-indicator__label deck-indicator__label--b">Deck B</div>
        <div class="deck-indicator__name">Through the Beat</div>
        <div class="deck-indicator__status deck-indicator__status--playing">▶ Playing</div>
      </div>
    </div>
    <div class="guide-arrow guide-arrow--right">→</div>
    <div class="crossfader-wrap">
      <div class="crossfader-labels"><span>A</span><span>B</span></div>
      <input type="range" class="crossfader-input pulse" id="crossfader" min="0" max="100" value="0" aria-label="Crossfader">
    </div>
  `);

  const cf = document.getElementById('crossfader');
  let completed = false;

  cf.addEventListener('input', () => {
    const val = parseInt(cf.value) / 100;
    setCrossfader(val);

    if (val >= 0.9 && !completed) {
      completed = true;
      cf.classList.remove('pulse');
      lessonScores[1] = true;
      progressFill.style.width = '66%';

      setTimeout(() => {
        showLessonComplete(2, 'Smooth transition!', startLesson3);
      }, 1000);
    }
  });
}

// ── Lesson 3: Drop the bass ─────────────────────────────────
function startLesson3() {
  state = 'lesson3';
  stepIndicator.textContent = '3 of 3';
  footer.textContent = 'Lesson 3 of 3 — Final lesson!';

  // Reset crossfader to center, both playing
  setCrossfader(0.5);
  setBassEQ(0);

  render(`
    <p class="lesson-title">Drop the bass</p>
    <p class="lesson-subtitle">Pull the bass EQ knob all the way down on Deck A. Listen to the bass disappear.</p>
    <div class="deck-row">
      <div class="deck-indicator">
        <div class="deck-indicator__label deck-indicator__label--a">Deck A</div>
        <div class="deck-indicator__name">Vox and Bells</div>
        <div class="deck-indicator__status deck-indicator__status--playing">▶ Playing</div>
      </div>
      <div class="deck-indicator">
        <div class="deck-indicator__label deck-indicator__label--b">Deck B</div>
        <div class="deck-indicator__name">Through the Beat</div>
        <div class="deck-indicator__status deck-indicator__status--playing">▶ Playing</div>
      </div>
    </div>
    <div class="guide-arrow">↓</div>
    <div class="eq-wrap">
      <div class="eq-label">BASS EQ — Deck A</div>
      <div class="eq-slider-container">
        <input type="range" class="eq-slider pulse" id="eq-bass" min="-24" max="6" value="0" aria-label="Bass EQ Deck A">
      </div>
      <div class="eq-value" id="eq-value">0 dB</div>
    </div>
  `);

  const eq = document.getElementById('eq-bass');
  const eqVal = document.getElementById('eq-value');
  let completed = false;

  eq.addEventListener('input', () => {
    const db = parseInt(eq.value);
    setBassEQ(db);
    eqVal.textContent = `${db} dB`;

    if (db <= -20 && !completed) {
      completed = true;
      eq.classList.remove('pulse');
      lessonScores[2] = true;
      progressFill.style.width = '100%';

      setTimeout(() => {
        showCelebration();
      }, 1500);
    }
  });
}

// ── Lesson Complete (between lessons) ───────────────────────
function showLessonComplete(num, message, nextFn) {
  render(`
    <div class="check">✓</div>
    <p class="lesson-title">${message}</p>
    <p class="lesson-subtitle">Lesson ${num} complete</p>
  `);

  setTimeout(nextFn, 2000);
}

// ── Celebration ─────────────────────────────────────────────
function showCelebration() {
  state = 'complete';
  stepIndicator.textContent = 'Complete!';
  progressBar.style.display = 'none';
  footer.textContent = '';

  // Stop audio
  try { sourceA?.stop(); sourceB?.stop(); } catch {}

  const score = lessonScores.filter(Boolean).length;

  spawnConfetti();

  const tweetText = encodeURIComponent("I just learned to DJ in 3 minutes with @dimaiowill's onset 🎧 Try it free: onsetdj.com");

  render(`
    <div class="celebration">
      <div class="score">${score}/3</div>
      <div class="score-label">Lessons Completed</div>
      <h2>You just made your first<br>DJ transition! 🎧</h2>
      <p class="lesson-subtitle">You played a track, blended between two decks, and swapped the bass — the fundamental building blocks of DJing.</p>
      <div class="cta-btns">
        <a href="https://app.onsetdj.com?access=1" class="cta-btn cta-btn--primary">Get the full app →</a>
        <a href="https://twitter.com/intent/tweet?text=${tweetText}" target="_blank" class="cta-btn cta-btn--ghost">Share on X</a>
        <a href="/" class="cta-btn cta-btn--ghost" style="font-size:13px">← Back to onsetdj.com</a>
      </div>
    </div>
  `);
}

function spawnConfetti() {
  const colors = ['#84fb42', '#d9a5ff', '#fec700', '#fff', '#6be026'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (Math.random() * 8 + 4) + 'px';
    el.style.height = (Math.random() * 8 + 4) + 'px';
    el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    el.style.animationDelay = (Math.random() * 0.5) + 's';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ── Init ────────────────────────────────────────────────────
startDemo();
</script>
</body>
</html>
